<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradiente suave para representar "Flow" e Foco -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    
    <!-- Sombra leve para dar profundidade -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Fundo arredondado (Squircle) -->
  <rect x="0" y="0" width="512" height="512" rx="100" fill="url(#bgGradient)" />

  <!-- Escudo (Proteção/Bloqueio) -->
  <path d="M256 80 L396 136 V256 C396 344 340 422 256 456 C172 422 116 344 116 256 V136 L256 80 Z" 
        fill="#ffffff" 
        filter="url(#shadow)"
        transform="scale(0.85) translate(38, 38)" />

  <!-- Sinal de Check (Whitelist/Site Permitido) -->
  <path d="M180 260 L230 310 L340 200" 
        fill="none" 
        stroke="#007bff" 
        stroke-width="40" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        transform="scale(0.85) translate(38, 38)" />
        
  <!-- Detalhe decorativo: Pequenos pontos "conectados" no fundo (Produtividade/Rede) -->
  <circle cx="120" cy="120" r="8" fill="white" opacity="0.5"/>
  <circle cx="392" cy="120" r="8" fill="white" opacity="0.5"/>
  <circle cx="392" cy="392" r="8" fill="white" opacity="0.5"/>
  <circle cx="120" cy="392" r="8" fill="white" opacity="0.5"/>
</svg>